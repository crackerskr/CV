<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wei Ling Tong - Resume</title>
    <!-- Styles -->
    <link id="theme-style" rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <button id="theme-toggle" class="theme-toggle">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>

    <div class="container">
        <!-- Profile (static) -->
        <section class="header">
            <div class="profile-img-container">
                <img id="profile-img" alt="Profile Picture">
            </div>
            <h1 id="profile-name"></h1>
            <p id="profile-title"></p>
            <div class="links" id="profile-links"></div>
        </section>

        <!-- Collapsible Sections -->
        <section class="card collapsible-card">
            <h2>Education</h2>
            <div class="content">
                <ul id="education-list"></ul>
            </div>
        </section>

        <section class="card collapsible-card">
            <h2>Experience</h2>
            <div class="content">
                <ul id="experience-list"></ul>
            </div>
        </section>

        <section class="card collapsible-card">
            <h2>Skills</h2>
            <div class="content" id="skills-container"></div>
        </section>

        <section class="card collapsible-card">
            <h2>Projects</h2>
            <div class="content">
                <ul id="projects-list"></ul>
            </div>
        </section>

        <section class="card collapsible-card">
            <h2>Awards</h2>
            <div class="content">
                <ul id="awards-list"></ul>
            </div>
        </section>
    </div>

    <!-- Theme Toggle Script -->
    <script type="module" src="./src/components/theme-toggle.js"></script>

    <!-- Renderer and Collapsible Scripts -->
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/components/script.js"></script>
</body>

</html>
